{% extends 'base.html' %}
{% block content %}

<h2>{{ job.title }}</h2>
<p>{{ job.description }}</p>
<p>Company: {{ job.company_name }}</p>
<p>Location: {{ job.location }}</p>

{% if user.is_authenticated %}
    {% if user.role == 'JOB_SEEKER' %}
        <a href="{% url 'apply_job' job.id %}" class="btn btn-success">
            Apply Now
        </a>
    {% endif %}
{% endif %}

{% endblock %}
